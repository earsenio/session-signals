name: CI

# Validates every PR and every push to main: frontend lint/typecheck/build on
# Linux, the Rust shell (fmt + clippy + tests + a compile smoke) on the two
# shipping targets, macOS and Windows, and a cargo-deny license check on Linux.
# The release workflow (release.yml) stays tag-triggered and separate.
on:
  pull_request:
  push:
    branches: [main]

# A newer push to the same ref cancels the in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# CI only reads the repo — never grant the default token more than that.
permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (lint · typecheck · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # package.json is the single version source (tauri.conf.json reads it
      # directly; sync-version.mjs copies it into Cargo.toml on release). Catch
      # a hand-edited Cargo.toml before it ships a mismatched bundle.
      - name: Check version consistency (package.json ↔ Cargo.toml)
        run: |
          NPM_V=$(node -p "require('./package.json').version")
          CARGO_V=$(sed -n 's/^version = "\(.*\)"/\1/p' src-tauri/Cargo.toml | head -1)
          if [ "$NPM_V" != "$CARGO_V" ]; then
            echo "::error::version mismatch: package.json=$NPM_V vs src-tauri/Cargo.toml=$CARGO_V (run npm run release:* — never hand-edit)"
            exit 1
          fi
          echo "version OK: $NPM_V"
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Prettier (check)
        run: npm run format:check
      - name: ESLint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Build frontend
        run: npm run build

  rust:
    name: Rust shell (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      # The Tauri app crate embeds the built frontend via generate_context!, so
      # `dist/` must exist before the Rust crate will compile (clippy/test/build).
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build frontend (provides dist/ for the Tauri context)
        run: npm run build

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Rustfmt (check)
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check
      - name: Clippy (deny warnings)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - name: Test
        run: cargo test --manifest-path src-tauri/Cargo.toml
      - name: Build (compile smoke)
        run: cargo build --manifest-path src-tauri/Cargo.toml

  # License policy: fails if any crate's license falls outside the deny.toml
  # allowlist, so THIRD_PARTY_LICENSES.md can't silently rot as Dependabot bumps
  # dependencies. The license set is platform-independent, so this runs once on
  # Linux — where cargo-deny-action's container is supported (it cannot run on
  # the macOS/Windows runners the Rust shell job uses).
  deny:
    name: cargo-deny (licenses)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: src-tauri/Cargo.toml
          command: check licenses
