name: Release

# Build the macOS + Windows installers and attach them to a GitHub Release
# whenever a vX.Y.Z tag is pushed. Tags are created by `npm run release:*` (see
# package.json / docs/VERSIONING.md), which also pushes the tag — that push is
# what triggers this workflow.
on:
  push:
    tags:
      - "v*"
  # Manual trigger: dispatch from a branch that has this trigger (e.g. main) and
  # pass the tag to build, e.g.
  #   gh workflow run release.yml --ref main -f tag=v0.1.1
  # Useful to (re)build an existing tag without re-tagging.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build (e.g. v0.1.1)"
        required: true

jobs:
  release:
    permissions:
      contents: write # create the Release and upload assets
      id-token: write # sign the build-provenance attestation (OIDC)
      attestations: write # store the attestation
    strategy:
      fail-fast: false
      matrix:
        include:
          # Universal binary covers both Apple Silicon and Intel Macs in one .dmg.
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      # On a tag push this is github.ref_name; on manual dispatch it's the input.
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS builds the universal binary, so it needs both arch targets.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        # tauri-action v1 is the stable line for Tauri 2; it builds the bundles
        # (frontend + Rust) and creates/uploads to the GitHub Release.
        id: tauri
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- Code signing (add as repo secrets to ship without OS warnings).
          # Until these are set the installers ship UNSIGNED (documented in the
          # README's install section). See:
          #   https://v2.tauri.app/distribute/sign/macos/
          #   https://v2.tauri.app/distribute/sign/windows/
          #
          # macOS — Developer ID signing + notarization. Provide the cert pair and
          # EITHER an Apple ID app-specific password OR an App Store Connect API key:
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          #   …or the API-key variant:
          # APPLE_API_ISSUER / APPLE_API_KEY / APPLE_API_KEY_PATH
          #
          # Windows — Authenticode via `bundle.windows.certificateThumbprint` in
          # tauri.conf.json (+ a cert on the runner), or Azure Trusted Signing via
          # `bundle.windows.trustedSigning`.
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: "Session Signals ${{ inputs.tag || github.ref_name }}"
          releaseBody: "Download the installer for your platform below."
          # Draft so a human reviews the assets before publishing. NOTE (tauri-action
          # v1): if a NON-draft release already exists for this tag, the action fails
          # rather than silently editing it — delete/redraft it before re-running.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # The installers ship unsigned until signing secrets are configured, so a
      # checksum file (+ the provenance attestation below) is the only integrity
      # story users have. One SHA256SUMS-<os>.txt per matrix job; uploaded via
      # the release id (drafts aren't reliably addressable by tag).
      - name: Generate and upload SHA256 checksums
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACTS: ${{ steps.tauri.outputs.artifactPaths }}
          RELEASE_ID: ${{ steps.tauri.outputs.releaseId }}
        run: |
          sum() { if command -v sha256sum >/dev/null 2>&1; then sha256sum "$1"; else shasum -a 256 "$1"; fi; }
          OUT="SHA256SUMS-$(echo '${{ matrix.platform }}' | cut -d- -f1).txt"
          printf '%s' "$ARTIFACTS" | node -e '
            const paths = JSON.parse(require("fs").readFileSync(0, "utf8"));
            console.log(paths.join("\n"));
          ' | while IFS= read -r f; do
            [ -f "$f" ] || continue
            # Record the bare filename, not the runner's absolute path.
            (cd "$(dirname "$f")" && sum "$(basename "$f")") >> "$OUT"
          done
          cat "$OUT"
          curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: text/plain" \
            --data-binary @"$OUT" \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets?name=$OUT" >/dev/null
          echo "uploaded $OUT to release $RELEASE_ID"

      # Signed provenance: proves each installer was built by THIS workflow from
      # THIS commit (verifiable with `gh attestation verify <file> -R <repo>`).
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ join(fromJSON(steps.tauri.outputs.artifactPaths), ', ') }}
