name: Feature request
description: Suggest an idea or improvement for Session Signals
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that Session Signals makes hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like Session Signals to do.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've thought about.
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This keeps Session Signals fully local — no telemetry, no outbound network calls.
          required: true
